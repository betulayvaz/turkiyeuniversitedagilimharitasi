
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Üniversiteler</title>
</head>
<body>

<h1>Üniversiteler</h1>

<div id="universityList">
    Üniversiteler yükleniyor...
</div>

<script type="module">

import { initializeApp } 
    from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import { 
    getFirestore, 
    collection, 
    getDocs 
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";


// Firebase yapılandırması
const firebaseConfig = {
    apiKey: "AIzaSyCoyFzIDNQEs9UHg4YrOdJdm55rRjKJCFs",
    authDomain: "turkiye-universite-haritasi.firebaseapp.com",
    projectId: "turkiye-universite-haritasi",
    storageBucket: "turkiye-universite-haritasi.firebasestorage.app",
    messagingSenderId: "448722620928",
    appId: "1:448722620928:web:72c8417fb4c6f55fd87ee5",
    measurementId: "G-H63J9HP38L"
};


// Firebase'i başlat
const app = initializeApp(firebaseConfig);

// Firestore bağlantısı
const db = getFirestore(app);


// URL parametrelerini al
const params = new URLSearchParams(window.location.search);

const city = params.get("city");
const year = parseInt(params.get("year"));

console.log("SEÇİLEN ŞEHİR:", city);
console.log("SEÇİLEN YIL:", year);


// Firebase'den üniversiteleri çek
async function getUniversities() {

    try {

        const querySnapshot = await getDocs(
            collection(db, "universities")
        );

        const universitiesData = [];

        querySnapshot.forEach((doc) => {

            universitiesData.push(doc.data());

        });

        console.log(
            "FIREBASE'DEN GELEN ÜNİVERSİTELER:",
            universitiesData
        );


        // Filtreleme
        const filteredUniversities = universitiesData.filter(
            function(university) {

                return university["City"] === city &&
                       university["Establishment Year"] <= year;

            }
        );


        console.log(
            "FİLTRELENEN ÜNİVERSİTELER:",
            filteredUniversities
        );

        console.log(
            "ÜNİVERSİTE SAYISI:",
            filteredUniversities.length
        );


        // HTML oluştur
        let html = "<h2>" + city + "</h2>";

        html += "<ul>";


        filteredUniversities.forEach(
            function(university) {

                html += 
                    "<li>" + 
                    university["University Name"] + 
                    "</li>";

            }
        );


        html += "</ul>";


        document.getElementById(
            "universityList"
        ).innerHTML = html;


    } catch (error) {

        console.error(
            "Firebase verileri alınırken hata oluştu:",
            error
        );

        document.getElementById(
            "universityList"
        ).innerHTML =
            "<p>Üniversite verileri yüklenemedi.</p>";

    }

}


// Fonksiyonu çalıştır
getUniversities();

</script>

</body>
</html>
